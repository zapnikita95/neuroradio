# Verify Android APK builds on every android/** push (no release publish).

name: Android Build Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: |
          chmod +x gradlew
          set -e
          for attempt in 1 2 3; do
            echo "assembleDebug attempt ${attempt}/3"
            if ./gradlew --no-daemon --stacktrace assembleDebug; then
              echo "Gradle build succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Gradle failed, retrying in 20s..."
              sleep 20
            fi
          done
          echo "Gradle build failed after 3 attempts" >&2
          exit 1

      - name: Verify APK at repo root
        run: |
          if [ ! -f efir-ai.apk ]; then
            echo "efir-ai.apk not found in repo root" >&2
            exit 1
          fi
          ls -lh efir-ai.apk
          test -s efir-ai.apk
