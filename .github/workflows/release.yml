# Build Android APK + browser extension ZIP and publish to GitHub Releases.
# Website reads /v1/public/downloads (BFF) or GitHub API — tag mobile-latest on main.

name: Release APK + Extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'chrome-extension/**'
      - 'website/**'
      - 'backend/**'
      - 'efir-ai.apk'
      - '.github/workflows/release.yml'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        id: gradle
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: |
          chmod +x gradlew
          set -e
          for attempt in 1 2 3; do
            echo "assembleDebug attempt ${attempt}/3"
            if ./gradlew --no-daemon --stacktrace assembleDebug; then
              echo "Gradle build succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Gradle failed, retrying in 20s..."
              sleep 20
            fi
          done
          echo "Gradle build failed after 3 attempts" >&2
          exit 1

      - name: Verify APK at repo root
        run: |
          if [ ! -f efir-ai.apk ]; then
            echo "efir-ai.apk not found in repo root after Gradle build" >&2
            exit 1
          fi
          ls -lh efir-ai.apk
          test -s efir-ai.apk

      - name: Pack browser extension
        run: |
          cd chrome-extension
          zip -r ../efir-extension.zip . -x '*.DS_Store'
          cd ..
          ls -lh efir-extension.zip

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=mobile-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous mobile-latest release
        if: steps.tag.outputs.name == 'mobile-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete mobile-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Efir AI — Android + Extension (${{ steps.tag.outputs.name }})
          body: |
            Автосборка Эфир AI · ${{ github.sha }}

            - **efir-ai.apk** — Android
            - **efir-extension.zip** — Chrome / Яндекс Браузер
          files: |
            efir-ai.apk
            efir-extension.zip
          make_latest: true
          draft: false
          prerelease: false
