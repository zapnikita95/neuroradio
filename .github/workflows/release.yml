# Build Android APK + browser extension ZIP and publish to GitHub Releases.
# Website reads /v1/public/downloads (BFF) or GitHub API — tag mobile-latest on main.

name: Release APK + Extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'chrome-extension/**'
      - 'website/**'
      - 'backend/**'
      - '.github/workflows/release.yml'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Verify APK at repo root
        run: |
          if [ ! -f MusicStory.apk ]; then
            echo "MusicStory.apk not found in repo root" >&2
            exit 1
          fi
          ls -lh MusicStory.apk

      - name: Pack browser extension
        run: |
          cd chrome-extension
          zip -r ../efir-extension.zip . -x '*.DS_Store'
          cd ..
          ls -lh efir-extension.zip

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=mobile-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous mobile-latest release
        if: steps.tag.outputs.name == 'mobile-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete mobile-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Efir AI — Android + Extension (${{ steps.tag.outputs.name }})
          body: |
            Автосборка Эфир AI · ${{ github.sha }}

            - **MusicStory.apk** — Android
            - **efir-extension.zip** — Chrome / Яндекс Браузер
          files: |
            MusicStory.apk
            efir-extension.zip
          make_latest: true
          draft: false
          prerelease: false
