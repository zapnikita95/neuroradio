# Silero TTS — ОТДЕЛЬНЫЙ сервис Railway.
#
# silero → Settings → Networking → Public → Port: 9898
# silero → Variables: НЕ добавляй RAILWAY_PUBLIC_DOMAIN вручную (Railway даёт сам)
# silero → Memory: минимум 2 GB (модель ~1 GB)
#
# music-story Variables (НЕ на silero!):
#   SILERO_TTS_URL=https://${{silero.RAILWAY_PUBLIC_DOMAIN}}
#   PUBLIC_BFF_URL=https://www.efir-ai.ru
#   BILLING_ADMIN_SECRET=<секрет>

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.silero"
watchPatterns = ["Dockerfile.silero", "silero-railway-entrypoint.py"]

[deploy]
healthcheckPath = "/voices"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
