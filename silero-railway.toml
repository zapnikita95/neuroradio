# Silero TTS — ОТДЕЛЬНЫЙ сервис Railway (не neuroradio BFF).
#
# В сервисе silero → Settings → Config-as-code → File path: silero-railway.toml
# (корневой railway.toml остаётся для BFF — иначе оба сервиса соберут один Dockerfile)
#
# На music-story (BFF) Variables:
#   SILERO_TTS_URL=https://${{silero.RAILWAY_PUBLIC_DOMAIN}}
#   (или Private: http://${{silero.RAILWAY_PRIVATE_DOMAIN}} — без https)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.silero"

[deploy]
healthcheckPath = "/voices"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
