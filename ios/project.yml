name: MusicStory
options:
  bundleIdPrefix: com.efirai
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.5.105"
    CURRENT_PROJECT_VERSION: "144"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  MusicStory:
    type: application
    platform: iOS
    sources:
      - path: MusicStory
        excludes:
          - Info.plist
    entitlements:
      path: MusicStory/MusicStory.entitlements
    info:
      path: MusicStory/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.efirai.myapp
      INFOPLIST_FILE: MusicStory/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: MusicStory/MusicStory.entitlements
      TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: MusicStoryWidgetExtension
        embed: true
  MusicStoryWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MusicStoryWidget
        excludes:
          - Info.plist
    info:
      path: MusicStoryWidget/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.efirai.myapp.widget
      INFOPLIST_FILE: MusicStoryWidget/Info.plist

schemes:
  MusicStory:
    build:
      targets:
        MusicStory: all
    run:
      config: Debug
    archive:
      config: Release
