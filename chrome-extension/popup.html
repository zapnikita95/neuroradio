<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="app.css" />
  <style>
    body { width: 280px; padding: 14px; }
    p { font-size: 13px; color: var(--muted); margin: 8px 0; }
  </style>
</head>
<body>
  <div class="bg-aurora"></div>
  <h1 class="brand">Эфир AI</h1>
  <p>Откройте панель расширения справа — там эфир, озвучка и вход.</p>
  <button type="button" id="open" class="btn btn-primary" style="width:100%">Открыть панель</button>
  <script>
    document.getElementById('open').onclick = () => {
      chrome.runtime.sendMessage({ type: 'open-panel' });
      window.close();
    };
  </script>
</body>
</html>
